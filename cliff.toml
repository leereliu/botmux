# git-cliff 配置 — 在手写中文 changelog 下面自动追加'本次合并'和'新贡献者'两段。
# 触发: CI 在 push tag (v*) 时调用; 也可本地预览: GITHUB_TOKEN=$(gh auth token) git-cliff --unreleased

[changelog]
header = ""
body = """
{%- if commits | length > 0 %}
---

## 本次合并
{% for commit in commits -%}
- {% if commit.remote.pr_title -%}{{ commit.remote.pr_title }}{%- else -%}{{ commit.message | split(pat="\n") | first | trim }}{%- endif %}\
{%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }})){%- endif %}\
{%- if commit.remote.username %} — @{{ commit.remote.username }}{%- endif %}
{% endfor -%}
{%- endif -%}
{%- set first_timers = github.contributors | filter(attribute="is_first_time", value=true) -%}
{%- if first_timers | length > 0 %}
## 新贡献者
{% for contributor in first_timers -%}
- @{{ contributor.username }} 在 [#{{ contributor.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ contributor.pr_number }}) 首次贡献,感谢!
{% endfor -%}
{%- endif %}
"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
# 跳过仓库维护者自己直接 push 的 commit (PR 合并仍保留,PR commit 的 author 是 PR 作者)
commit_parsers = [
    { field = "author.email", pattern = "shenhan\\.sh@bytedance\\.com", skip = true },
]

[remote.github]
owner = "deepcoldy"
repo = "botmux"
